server:
  port: 8080
  shutdown: graceful
  reactive:
    session:
      timeout: 30m
  compression:
    enabled: true
    min-response-size: 1024
    mime-types: application/json,text/html,text/xml,text/plain,application/javascript,text/css

api:
  version:
    prefix: v1
  pagination:
    default-page: 0
    default-size: 50
    max-size: 500
    max-page: 1000

spring:
  application:
    name: online-mdm

  threads:
    virtual:
      enabled: true
  reactor:
    context-propagation: auto

  jackson:
    property-naming-strategy: SNAKE_CASE
    default-property-inclusion: non_null

  autoconfigure:
    exclude:
      - org.springframework.boot.security.autoconfigure.UserDetailsServiceAutoConfiguration
      - org.springframework.boot.security.autoconfigure.ReactiveUserDetailsServiceAutoConfiguration

  flyway:
    enabled: true
    locations: classpath:db/migration

  # JDBC configuration for database operations
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5433}/${POSTGRES_DB:mdm}?stringtype=unspecified
    username: ${POSTGRES_USER:mdm}
    password: ${POSTGRES_PASSWORD:mdm}
    driver-class-name: org.postgresql.Driver
    hikari:
      # Auto-scale based on CPU cores: pool_size = cores * 2 + 1 (for I/O-bound)
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:100}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 2000
      pool-name: MdmHikariPool
      initialization-fail-timeout: -1

  jdbc:
    template:
      fetch-size: 1000
      max-rows: 10000
      query-timeout: 30

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    listener:
      simple:
        default-requeue-rejected: false
        auto-startup: ${RABBITMQ_LISTENER_AUTO_STARTUP:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
      probes:
        enabled: true
  security:
    allowed-cidrs: ${MANAGEMENT_ALLOWED_CIDRS:127.0.0.1/32,::1/128}
  tracing:
    enabled: ${TRACING_ENABLED:true}
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://localhost:${ZIPKIN_PORT:9411}/api/v2/spans}
    ui-url: ${ZIPKIN_UI_URL:http://localhost:${ZIPKIN_PORT:9411}}
  rabbitmq:
    ui-url: ${RABBITMQ_UI_URL:http://localhost:15672}

logging:
  level:
    root: ${LOG_LEVEL_ROOT:INFO}
    org.springframework.web: ${LOG_LEVEL_WEB:INFO}
    org.springframework.jdbc.core: ${LOG_LEVEL_JDBC:INFO}
    reactor.netty: ${LOG_LEVEL_NETTY:INFO}
    org.flywaydb: ${LOG_LEVEL_FLYWAY:INFO}
    org.springframework.boot.autoconfigure.flyway: ${LOG_LEVEL_FLYWAY:INFO}
    com.e24online: ${LOG_LEVEL_APP:DEBUG}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level [traceId=%X{traceId:-},spanId=%X{spanId:-}] %logger{36} - %msg%n"

resilience4j:
  ratelimiter:
    instances:
      ingest:
        # Auto-scale: 100 RPS per CPU core, default 500
        limit-for-period: ${RATE_LIMIT_RPS:500}
        limit-refresh-period: 1s
        timeout-duration: 0
  retry:
    instances:
      ingest:
        max-attempts: 3
        wait-duration: 100ms

security:
  password:
    bcrypt-strength: 12
    # =====================================================================
    # Breached Password Detection - FREE Options
    # =====================================================================
    
    # Option 1: Local offline checking (FREE, NO API KEY NEEDED)
    # Checks against top 1000+ most common breached passwords
    local-check:
      enabled: ${SECURITY_PASSWORD_LOCAL_CHECK_ENABLED:true}
    
    # Option 2: Pattern-based detection (FREE, OFFLINE)
    # Detects keyboard patterns, sequences, repeats, dates, etc.
    pattern-check:
      enabled: ${SECURITY_PASSWORD_PATTERN_CHECK_ENABLED:true}
    
    # Option 3: HIBP API (FREE but rate-limited, optional)
    # Have I Been Pwned API - k-anonymity API is FREE without API key
    # Get API key from https://haveibeenpwned.com/API/v3 for higher limits
    hibp:
      # Enable HIBP checking (default: false for offline-only operation)
      enabled: ${SECURITY_PASSWORD_HIBP_ENABLED:false}
      # Optional API key (not required for basic free tier)
      # Without API key: 15 requests/minute (free k-anonymity API)
      # With API key: Much higher rate limits
      api-key: ${SECURITY_PASSWORD_HIBP_API_KEY:}

  jwt:
    access-ttl-seconds: 3600       # 60 minutes
    refresh-ttl-seconds: 604800   # 7 days

mdm:
  token:
    # Automatic revocation of expired refresh tokens
    # Cron expression: sec min hour day month weekday
    # Default: daily at 2:00 AM
    revocation:
      cron: ${MDM_TOKEN_REVOCATION_CRON:0 0 2 * * *}

  audit:
    queue:
      exchange: ${AUDIT_QUEUE_EXCHANGE:mdm.audit.exchange}
      routing-key: ${AUDIT_QUEUE_ROUTING_KEY:mdm.audit}
      queue: ${AUDIT_QUEUE_NAME:mdm.audit.queue}
      dead-letter-exchange: ${AUDIT_QUEUE_DLX:mdm.audit.dlx}
      dead-letter-routing-key: ${AUDIT_QUEUE_DLX_ROUTING_KEY:mdm.audit.dlq}
      dead-letter-queue: ${AUDIT_QUEUE_DLQ:mdm.audit.dlq}
      message-ttl-ms: ${AUDIT_QUEUE_MESSAGE_TTL_MS:300000}
      consumer-concurrency: ${AUDIT_QUEUE_CONSUMER_CONCURRENCY:1}
      max-consumer-concurrency: ${AUDIT_QUEUE_MAX_CONSUMER_CONCURRENCY:4}
      retry-max-attempts: ${AUDIT_QUEUE_RETRY_MAX_ATTEMPTS:4}
      retry-initial-interval-ms: ${AUDIT_QUEUE_RETRY_INITIAL_INTERVAL_MS:500}
      retry-multiplier: ${AUDIT_QUEUE_RETRY_MULTIPLIER:2.0}
      retry-max-interval-ms: ${AUDIT_QUEUE_RETRY_MAX_INTERVAL_MS:10000}
  posture:
    queue:
      exchange: ${POSTURE_QUEUE_EXCHANGE:mdm.posture.eval.exchange}
      routing-key: ${POSTURE_QUEUE_ROUTING_KEY:mdm.posture.eval}
      queue: ${POSTURE_QUEUE_NAME:mdm.posture.eval.queue}
      dead-letter-exchange: ${POSTURE_QUEUE_DLX:mdm.posture.eval.dlx}
      dead-letter-routing-key: ${POSTURE_QUEUE_DLX_ROUTING_KEY:mdm.posture.eval.dlq}
      dead-letter-queue: ${POSTURE_QUEUE_DLQ:mdm.posture.eval.dlq}
      message-ttl-ms: ${POSTURE_QUEUE_MESSAGE_TTL_MS:300000}
      consumer-concurrency: ${POSTURE_QUEUE_CONSUMER_CONCURRENCY:2}
      max-consumer-concurrency: ${POSTURE_QUEUE_MAX_CONSUMER_CONCURRENCY:6}
      retry-max-attempts: ${POSTURE_QUEUE_RETRY_MAX_ATTEMPTS:4}
      retry-initial-interval-ms: ${POSTURE_QUEUE_RETRY_INITIAL_INTERVAL_MS:500}
      retry-multiplier: ${POSTURE_QUEUE_RETRY_MULTIPLIER:2.0}
      retry-max-interval-ms: ${POSTURE_QUEUE_RETRY_MAX_INTERVAL_MS:10000}
  policy:
    audit:
      queue:
        exchange: ${POLICY_AUDIT_QUEUE_EXCHANGE:mdm.policy.audit.exchange}
        routing-key: ${POLICY_AUDIT_QUEUE_ROUTING_KEY:mdm.policy.audit}
        queue: ${POLICY_AUDIT_QUEUE_NAME:mdm.policy.audit.queue}
        dead-letter-exchange: ${POLICY_AUDIT_QUEUE_DLX:mdm.policy.audit.dlx}
        dead-letter-routing-key: ${POLICY_AUDIT_QUEUE_DLX_ROUTING_KEY:mdm.policy.audit.dlq}
        dead-letter-queue: ${POLICY_AUDIT_QUEUE_DLQ:mdm.policy.audit.dlq}
        message-ttl-ms: ${POLICY_AUDIT_QUEUE_MESSAGE_TTL_MS:300000}
        consumer-concurrency: ${POLICY_AUDIT_QUEUE_CONSUMER_CONCURRENCY:1}
        max-consumer-concurrency: ${POLICY_AUDIT_QUEUE_MAX_CONSUMER_CONCURRENCY:4}
        retry-max-attempts: ${POLICY_AUDIT_QUEUE_RETRY_MAX_ATTEMPTS:4}
        retry-initial-interval-ms: ${POLICY_AUDIT_QUEUE_RETRY_INITIAL_INTERVAL_MS:500}
        retry-multiplier: ${POLICY_AUDIT_QUEUE_RETRY_MULTIPLIER:2.0}
        retry-max-interval-ms: ${POLICY_AUDIT_QUEUE_RETRY_MAX_INTERVAL_MS:10000}
  reference-sync:
    enabled: ${MDM_REFERENCE_SYNC_ENABLED:true}
    daily-cron: "${MDM_REFERENCE_SYNC_DAILY_CRON:0 10 2 * * *}"
    zone: ${MDM_REFERENCE_SYNC_ZONE:Asia/Kolkata}
    run-on-startup: ${MDM_REFERENCE_SYNC_RUN_ON_STARTUP:false}
    actor: ${MDM_REFERENCE_SYNC_ACTOR:system-seed}
    os-lifecycle:
      enabled: ${MDM_REFERENCE_SYNC_OS_ENABLED:true}
      restore-from-year: ${MDM_REFERENCE_SYNC_OS_RESTORE_FROM_YEAR:2015}
      request-timeout-seconds: ${MDM_REFERENCE_SYNC_OS_REQUEST_TIMEOUT_SECONDS:20}
      retries: ${MDM_REFERENCE_SYNC_OS_RETRIES:3}
    app-catalog:
      enabled: ${MDM_REFERENCE_SYNC_APP_ENABLED:true}
      app-map-location: ${MDM_REFERENCE_SYNC_APP_MAP_LOCATION:classpath:sync/app_map.json}
      request-timeout-seconds: ${MDM_REFERENCE_SYNC_APP_REQUEST_TIMEOUT_SECONDS:20}
      retries: ${MDM_REFERENCE_SYNC_APP_RETRIES:2}
      enrich-ios-from-itunes: ${MDM_REFERENCE_SYNC_APP_ENRICH_IOS_FROM_ITUNES:true}
