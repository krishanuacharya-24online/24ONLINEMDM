<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section data-preserve-button-labels="true">
    <section class="card">
        <div class="page-head">
            <div>
                <h2>Policy audit trail</h2>
                <div class="muted">Track who changed policies, what changed, and when the change happened.</div>
            </div>
            <div th:replace="~{fragments/policy_nav :: links(${activePolicy})}"></div>
        </div>
    </section>

    <section class="card mt-1">
        <h2>Filters</h2>
        <div class="form-row">
            <div>
                <label for="audit_policy_type">Policy type</label><br/>
                <select id="audit_policy_type">
                    <option value="">All</option>
                    <option value="SYSTEM_RULE">SYSTEM_RULE</option>
                    <option value="REJECT_APPLICATION">REJECT_APPLICATION</option>
                    <option value="TRUST_SCORE_POLICY">TRUST_SCORE_POLICY</option>
                    <option value="TRUST_DECISION_POLICY">TRUST_DECISION_POLICY</option>
                    <option value="REMEDIATION_RULE">REMEDIATION_RULE</option>
                    <option value="RULE_REMEDIATION_MAPPING">RULE_REMEDIATION_MAPPING</option>
                </select>
            </div>
            <div>
                <label for="audit_operation">Operation</label><br/>
                <select id="audit_operation">
                    <option value="">All</option>
                    <option value="CREATE">CREATE</option>
                    <option value="UPDATE">UPDATE</option>
                    <option value="DELETE">DELETE</option>
                    <option value="CLONE">CLONE</option>
                </select>
            </div>
            <div>
                <label for="audit_actor">Actor</label><br/>
                <input id="audit_actor" type="text" placeholder="username"/>
            </div>
        </div>
    </section>

    <section class="card mt-1">
        <h2>Events</h2>
        <table id="policyAuditTable" class="display responsive nowrap w-100">
            <thead>
            <tr>
                <th>ID</th>
                <th>When</th>
                <th>Type</th>
                <th>Policy ID</th>
                <th>Operation</th>
                <th>Tenant</th>
                <th>Actor</th>
                <th>Approval ticket</th>
            </tr>
            </thead>
        </table>
    </section>

    <script type="module" th:src="@{/assets/js/pages/policies_audit_trail_dt.js}"></script>
</section>
</html>
