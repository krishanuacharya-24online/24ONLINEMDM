<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section>
    <section class="card">
        <div class="page-head">
            <div>
                <h2>Application catalog</h2>
                <div class="muted">Normalized application identity catalog.</div>
            </div>
            <div class="page-head__actions">
                <div class="sync-action">
                    <button
                            id="syncNowCatalogBtn"
                            type="button"
                            class="secondary btn-inline-icon"
                            data-sync-now="true"
                            data-sync-trigger="manual-ui-catalog"
                            data-no-icon="true">
                        <span class="btn-inline-icon__glyph" aria-hidden="true">&#x21bb;</span>
                        <span>Sync Now</span>
                    </button>
                    <span class="sync-last-label muted" data-sync-last="true" aria-live="polite">Last sync: Never</span>
                </div>
            </div>
        </div>
    </section>

    <section class="card mt-1">
        <h2>Applications</h2>
        <table id="catalogAppsTable" class="display responsive nowrap w-100">
            <thead>
            <tr>
                <th>ID</th>
                <th>OS</th>
                <th>Package</th>
                <th>Name</th>
                <th>Publisher</th>
                <th>Actions</th>
            </tr>
            </thead>
        </table>
    </section>

    <section class="card mt-1">
        <h2>Create / edit</h2>
        <form id="catalogAppsForm" class="split">
            <div>
                <div class="kvs">
                    <div class="k"><label for="os_type">OS type</label></div>
                    <div class="v">
                        <select id="os_type" required></select>
                    </div>
                    <div class="k"><label for="package_id">Package ID</label></div>
                    <div class="v"><input id="package_id" type="text" placeholder="Optional"/></div>
                </div>
            </div>
            <div>
                <div class="kvs">
                    <div class="k"><label for="app_name">App name</label></div>
                    <div class="v"><input id="app_name" type="text" required/></div>
                    <div class="k"><label for="publisher">Publisher</label></div>
                    <div class="v"><input id="publisher" type="text" placeholder="Optional"/></div>
                </div>
                <div class="form-row mt-075">
                    <input id="edit_id" type="hidden"/>
                    <button type="submit">Save</button>
                    <button id="resetBtn" class="secondary" type="button">Reset</button>
                </div>
            </div>
        </form>
    </section>

    <script type="module" th:src="@{/assets/js/pages/catalog_applications_dt.js}"></script>
</section>
</html>
