<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section>
    <section class="card max-w-680">
        <div class="page-head">
            <div>
                <h2>Change password</h2>
                <div class="muted">Keep credentials private and rotate passwords regularly.</div>
            </div>
        </div>

        <form id="changePasswordForm" class="kvs mt-1">
            <div class="k"><label for="currentPassword">Current password</label></div>
            <div class="v"><input id="currentPassword" type="password" required/></div>

            <div class="k"><label for="newPassword">New password</label></div>
            <div class="v"><input id="newPassword" type="password" minlength="12" required/></div>

            <div class="k"><label for="confirmPassword">Confirm new password</label></div>
            <div class="v"><input id="confirmPassword" type="password" minlength="12" required/></div>

            <div class="k"></div>
            <div class="v">
                <button type="submit">Update password</button>
            </div>
        </form>

        <div id="changePasswordMessage" class="muted mt-07"></div>
    </section>

    <script type="module" th:src="@{/assets/js/pages/change_password.js}"></script>
</section>
</html>
