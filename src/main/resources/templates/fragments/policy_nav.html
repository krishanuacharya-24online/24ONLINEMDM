<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div class="tab-links" th:fragment="links(activePolicy)">
    <a th:if="${policyNav.simpleCenter}" class="link-btn" th:href="@{/ui/policies}" th:attr="data-active=${activePolicy == 'simple'}">
        <span class="link-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M4 12h16"/><path d="M12 4v16"/><rect x="4" y="4" width="16" height="16" rx="3"/></svg>
        </span>
        <span>Simple center</span>
    </a>
    <a th:if="${policyNav.advancedPages}" class="link-btn" th:href="@{/ui/policies/system-rules}" th:attr="data-active=${activePolicy == 'system-rules'}">
        <span class="link-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M4 7h16"/><path d="M4 12h10"/><path d="M4 17h16"/><circle cx="17" cy="12" r="2"/></svg>
        </span>
        <span>System rules</span>
    </a>
    <a th:if="${policyNav.advancedPages}" class="link-btn" th:href="@{/ui/policies/reject-apps}" th:attr="data-active=${activePolicy == 'reject-apps'}">
        <span class="link-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><circle cx="12" cy="12" r="8"/><path d="M8.5 8.5l7 7"/></svg>
        </span>
        <span>Reject apps</span>
    </a>
    <a th:if="${policyNav.advancedPages}" class="link-btn" th:href="@{/ui/policies/trust-score-policies}" th:attr="data-active=${activePolicy == 'trust-score-policies'}">
        <span class="link-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M5 16l4-4 3 3 7-7"/><path d="M5 20h14"/></svg>
        </span>
        <span>Trust policies</span>
    </a>
    <a th:if="${policyNav.advancedPages}" class="link-btn" th:href="@{/ui/policies/trust-decision-policies}" th:attr="data-active=${activePolicy == 'trust-decision-policies'}">
        <span class="link-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M12 4v16"/><path d="M12 7h7"/><path d="M12 17h7"/><path d="M5 12h7"/></svg>
        </span>
        <span>Decision policies</span>
    </a>
    <a th:if="${policyNav.advancedPages}" class="link-btn" th:href="@{/ui/policies/remediation-rules}" th:attr="data-active=${activePolicy == 'remediation-rules'}">
        <span class="link-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M14 6l4 4"/><path d="M7 17l11-11"/><path d="M5 19l4-1-3-3-1 4z"/></svg>
        </span>
        <span>Remediations</span>
    </a>
    <a th:if="${policyNav.advancedPages}" class="link-btn" th:href="@{/ui/policies/rule-remediation-mappings}" th:attr="data-active=${activePolicy == 'rule-remediation-mappings'}">
        <span class="link-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M10 14l-2 2a3 3 0 1 1-4-4l2-2"/><path d="M14 10l2-2a3 3 0 1 1 4 4l-2 2"/><path d="M9 15l6-6"/></svg>
        </span>
        <span>Mappings</span>
    </a>
    <a th:if="${policyNav.auditTrail}" class="link-btn" th:href="@{/ui/policies/audit-trail}" th:attr="data-active=${activePolicy == 'audit-trail'}">
        <span class="link-btn__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" focusable="false"><path d="M8 6h9"/><path d="M8 12h9"/><path d="M8 18h9"/><path d="M5 6h.01"/><path d="M5 12h.01"/><path d="M5 18h.01"/></svg>
        </span>
        <span>Audit trail</span>
    </a>
</div>
</body>
</html>
