<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section>
    <section class="card">
        <div class="page-head">
            <div>
                <h2>Reject applications</h2>
                <div class="muted">Blacklist rules for applications that should be blocked or remediated.</div>
            </div>
            <div class="tab-links">
                <a class="link-btn" th:href="@{/ui/policies/system-rules}" th:attr="data-active=${activePolicy == 'system-rules'}">System rules</a>
                <a class="link-btn" th:href="@{/ui/policies/reject-apps}" th:attr="data-active=${activePolicy == 'reject-apps'}">Reject apps</a>
                <a class="link-btn" th:href="@{/ui/policies/trust-score-policies}" th:attr="data-active=${activePolicy == 'trust-score-policies'}">Trust policies</a>
                <a class="link-btn" th:href="@{/ui/policies/trust-decision-policies}" th:attr="data-active=${activePolicy == 'trust-decision-policies'}">Decision policies</a>
                <a class="link-btn" th:href="@{/ui/policies/remediation-rules}" th:attr="data-active=${activePolicy == 'remediation-rules'}">Remediations</a>
                <a class="link-btn" th:href="@{/ui/policies/rule-remediation-mappings}" th:attr="data-active=${activePolicy == 'rule-remediation-mappings'}">Mappings</a>
                <a class="link-btn" th:href="@{/ui/policies/audit-trail}" th:attr="data-active=${activePolicy == 'audit-trail'}">Audit trail</a>
            </div>
        </div>
    </section>

    <section class="card mt-1">
        <h2>Reject apps</h2>
        <table id="rejectAppsTable" class="display responsive nowrap w-100">
            <thead>
            <tr>
                <th>ID</th>
                <th>OS</th>
                <th>App</th>
                <th>Package</th>
                <th>Sev</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
        </table>
    </section>

    <section class="card mt-1">
        <h2>Create / edit</h2>
        <form id="rejectAppsForm" class="split">
            <div>
                <div class="kvs">
                    <div class="k"><label for="policy_tag">Policy tag</label></div>
                    <div class="v"><input id="policy_tag" type="text" required/></div>
                    <div class="k"><label for="threat_type">Threat type</label></div>
                    <div class="v"><input id="threat_type" type="text" required/></div>
                    <div class="k"><label for="severity">Severity</label></div>
                    <div class="v">
                        <select id="severity" required>
                            <option value="1">1 - Low</option>
                            <option value="2">2 - Guarded</option>
                            <option value="3" selected>3 - Medium</option>
                            <option value="4">4 - High</option>
                            <option value="5">5 - Critical</option>
                        </select>
                        <div id="reject_severity_hint" class="muted"></div>
                    </div>
                    <div class="k"><label for="reject_preview_examples">Fallback score impact</label></div>
                    <div class="v">
                        <div id="reject_preview_formula" class="muted"></div>
                        <div id="reject_preview_examples" class="muted"></div>
                        <div id="reject_preview_override_note" class="muted"></div>
                    </div>
                    <div class="k"><label for="blocked_reason">Blocked reason</label></div>
                    <div class="v"><input id="blocked_reason" type="text" required/></div>
                    <div class="k"><label for="app_os_type">App OS type</label></div>
                    <div class="v">
                        <select id="app_os_type" required></select>
                    </div>
                    <div class="k"><label for="app_category">App category</label></div>
                    <div class="v"><input id="app_category" type="text" required/></div>
                    <div class="k"><label for="app_name">App name</label></div>
                    <div class="v"><input id="app_name" type="text" required/></div>
                </div>
            </div>
            <div>
                <div class="kvs">
                    <div class="k"><label for="publisher">Publisher</label></div>
                    <div class="v"><input id="publisher" type="text" placeholder="Optional"/></div>
                    <div class="k"><label for="package_id">Package ID</label></div>
                    <div class="v"><input id="package_id" type="text" placeholder="Optional"/></div>
                    <div class="k"><label for="app_latest_version">Latest version</label></div>
                    <div class="v"><input id="app_latest_version" type="text" required/></div>
                    <div class="k"><label for="min_allowed_version">Min allowed version</label></div>
                    <div class="v"><input id="min_allowed_version" type="text" required/></div>
                    <div class="k"><label for="status">Status</label></div>
                    <div class="v"><select id="status"></select></div>
                    <div class="k"><label for="effective_from">Effective from</label></div>
                    <div class="v"><input id="effective_from" type="date"/></div>
                    <div class="k"><label for="effective_to">Effective to</label></div>
                    <div class="v"><input id="effective_to" type="date"/></div>
                </div>
                <div class="form-row mt-075">
                    <input id="edit_id" type="hidden"/>
                    <button type="submit">Save</button>
                    <button id="resetBtn" class="secondary" type="button">Reset</button>
                </div>
            </div>
        </form>
    </section>

    <script type="module" th:src="@{/assets/js/pages/policies_reject_apps_dt.js}"></script>
</section>
</html>
