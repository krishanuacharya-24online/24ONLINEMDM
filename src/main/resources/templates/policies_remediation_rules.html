<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section data-preserve-button-labels="true">
    <section class="card">
        <div class="page-head">
            <div>
                <h2>Remediation rules</h2>
                <div class="muted">Remediation instructions and actions.</div>
            </div>
            <div th:replace="~{fragments/policy_nav :: links(${activePolicy})}"></div>
        </div>
    </section>

    <section class="card mt-1">
        <h2>Remediation rules</h2>
        <table id="remediationRulesTable" class="display responsive nowrap w-100">
            <thead>
            <tr>
                <th>ID</th>
                <th>Code</th>
                <th>Type</th>
                <th>OS</th>
                <th>Device</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
        </table>
    </section>

    <section class="card mt-1">
        <h2>Create / edit</h2>
        <form id="remediationRulesForm" class="split">
            <div>
                <div class="kvs">
                    <div class="k"><label for="remediation_code">Code</label></div>
                    <div class="v"><input id="remediation_code" type="text" required readonly placeholder="Auto generated"/></div>
                    <div class="k"><label for="title">Title</label></div>
                    <div class="v"><input id="title" type="text" required/></div>
                    <div class="k"><label for="description">Description</label></div>
                    <div class="v"><textarea id="description" required></textarea></div>
                    <div class="k"><label for="remediation_type">Type</label></div>
                    <div class="v">
                        <select id="remediation_type" required></select>
                    </div>
                </div>
            </div>
            <div>
                <div class="kvs">
                    <div class="k"><label for="os_type">OS type</label></div>
                    <div class="v">
                        <select id="os_type"></select>
                    </div>
                    <div class="k"><label for="device_type">Device type</label></div>
                    <div class="v">
                        <select id="device_type"></select>
                    </div>
                    <div class="k"><label for="priority">Priority</label></div>
                    <div class="v">
                        <input id="priority" type="number" value="100" min="1" max="1000" required/>
                        <div id="remediation_priority_hint" class="muted"></div>
                    </div>
                    <div class="k"><label for="remediation_priority_preview">Execution preview</label></div>
                    <div class="v">
                        <div id="remediation_priority_preview" class="muted"></div>
                    </div>
                    <div class="k"><label for="status">Status</label></div>
                    <div class="v"><select id="status"></select></div>
                    <div class="k"><label for="effective_from">Effective from</label></div>
                    <div class="v"><input id="effective_from" type="date"/></div>
                    <div class="k"><label for="effective_to">Effective to</label></div>
                    <div class="v"><input id="effective_to" type="date"/></div>
                </div>
                <div class="form-row mt-075">
                    <input id="edit_id" type="hidden"/>
                    <button type="submit">Save</button>
                    <button id="resetBtn" class="secondary" type="button">Reset</button>
                </div>
            </div>
        </form>
    </section>

    <script type="module" th:src="@{/assets/js/pages/policies_remediation_rules_dt.js}"></script>
</section>
</html>
