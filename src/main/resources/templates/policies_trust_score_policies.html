<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section data-preserve-button-labels="true">
    <section class="card">
        <div class="page-head">
            <div>
                <h2>Trust score policies</h2>
                <div class="muted">Scoring rules that convert signals into score deltas.</div>
            </div>
            <div th:replace="~{fragments/policy_nav :: links(${activePolicy})}"></div>
        </div>
    </section>

    <section class="card mt-1">
        <h2>Trust score policies</h2>
        <table id="trustPoliciesTable" class="display responsive nowrap w-100">
            <thead>
            <tr>
                <th>ID</th>
                <th>Code</th>
                <th>Source</th>
                <th>Signal</th>
                <th>Delta</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
        </table>
    </section>

    <section class="card mt-1">
        <h2>Create / edit</h2>
        <form id="trustPoliciesForm" class="split">
            <div>
                <div class="kvs">
                    <div class="k"><label for="policy_code">Policy code</label></div>
                    <div class="v"><input id="policy_code" type="text" required/></div>
                    <div class="k"><label for="source_type">Source type</label></div>
                    <div class="v">
                        <select id="source_type" required></select>
                    </div>
                    <div class="k"><label for="signal_key">Signal key</label></div>
                    <div class="v"><input id="signal_key" type="text" required/></div>
                    <div class="k"><label for="severity">Severity</label></div>
                    <div class="v">
                        <select id="severity">
                            <option value="" selected>Any severity (optional)</option>
                            <option value="1">1 - Low</option>
                            <option value="2">2 - Guarded</option>
                            <option value="3">3 - Medium</option>
                            <option value="4">4 - High</option>
                            <option value="5">5 - Critical</option>
                        </select>
                        <div id="trust_policy_severity_hint" class="muted"></div>
                    </div>
                    <div class="k"><label for="compliance_action">Compliance action</label></div>
                    <div class="v">
                        <select id="compliance_action"></select>
                    </div>
                </div>
            </div>
            <div>
                <div class="kvs">
                    <div class="k"><label for="score_delta">Score delta</label></div>
                    <div class="v">
                        <input id="score_delta" type="number" value="-10" min="-1000" max="1000" required/>
                        <div id="trust_policy_delta_hint" class="muted"></div>
                    </div>
                    <div class="k"><label for="weight">Weight</label></div>
                    <div class="v">
                        <input id="weight" type="number" value="1.0" min="0.0001" max="10" step="0.01" required/>
                        <div id="trust_policy_weight_hint" class="muted"></div>
                    </div>
                    <div class="k"><label for="trust_policy_preview_examples">Weighted impact preview</label></div>
                    <div class="v">
                        <div id="trust_policy_preview_formula" class="muted"></div>
                        <div id="trust_policy_preview_examples" class="muted"></div>
                        <div id="trust_policy_preview_note" class="muted"></div>
                    </div>
                    <div class="k"><label for="status">Status</label></div>
                    <div class="v"><select id="status"></select></div>
                    <div class="k"><label for="effective_from">Effective from</label></div>
                    <div class="v"><input id="effective_from" type="date"/></div>
                    <div class="k"><label for="effective_to">Effective to</label></div>
                    <div class="v"><input id="effective_to" type="date"/></div>
                </div>
                <div class="form-row mt-075">
                    <input id="edit_id" type="hidden"/>
                    <button type="submit">Save</button>
                    <button id="resetBtn" class="secondary" type="button">Reset</button>
                </div>
            </div>
        </form>
    </section>

    <script type="module" th:src="@{/assets/js/pages/policies_trust_score_policies_dt.js}"></script>
</section>
</html>
