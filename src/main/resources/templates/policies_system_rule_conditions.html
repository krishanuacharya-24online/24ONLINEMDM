<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::section})}">
<section>
    <section class="card">
        <div class="page-head">
            <div>
                <h2 th:text="'System rule conditions - Rule #' + ${ruleId}">System rule conditions</h2>
                <div class="muted">Backed by <code>system_information_rule_condition</code>. Deletions are soft deletes.</div>
            </div>
            <div class="tab-links">
                <a class="link-btn" th:href="@{/ui/policies/system-rules}" th:attr="data-active=${activePolicy == 'system-rules'}">System rules</a>
                <a class="link-btn" th:href="@{/ui/policies/reject-apps}" th:attr="data-active=${activePolicy == 'reject-apps'}">Reject apps</a>
                <a class="link-btn" th:href="@{/ui/policies/trust-score-policies}" th:attr="data-active=${activePolicy == 'trust-score-policies'}">Trust policies</a>
                <a class="link-btn" th:href="@{/ui/policies/trust-decision-policies}" th:attr="data-active=${activePolicy == 'trust-decision-policies'}">Decision policies</a>
                <a class="link-btn" th:href="@{/ui/policies/remediation-rules}" th:attr="data-active=${activePolicy == 'remediation-rules'}">Remediations</a>
                <a class="link-btn" th:href="@{/ui/policies/rule-remediation-mappings}" th:attr="data-active=${activePolicy == 'rule-remediation-mappings'}">Mappings</a>
                <a class="link-btn" th:href="@{/ui/policies/audit-trail}" th:attr="data-active=${activePolicy == 'audit-trail'}">Audit trail</a>
            </div>
        </div>
    </section>

    <section class="card mt-1">
        <h2>Conditions</h2>
        <table id="ruleConditionsTable" class="display responsive nowrap w-100" th:attr="data-rule-id=${ruleId}">
            <thead>
            <tr>
                <th>ID</th>
                <th>Group</th>
                <th>Field</th>
                <th>Operator</th>
                <th>Value text</th>
                <th>Value numeric</th>
                <th>Value bool</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
        </table>
    </section>

    <section class="card mt-1">
        <h2>Create / edit</h2>
        <form id="ruleConditionsForm" class="split">
            <div>
                <div class="kvs">
                    <div class="k"><label for="condition_group">Condition group</label></div>
                    <div class="v"><input id="condition_group" type="number" required value="1"/></div>
                    <div class="k"><label for="field_name">Field name</label></div>
                    <div class="v"><input id="field_name" type="text" required/></div>
                    <div class="k"><label for="operator">Operator</label></div>
                    <div class="v">
                        <select id="operator"></select>
                    </div>
                    <div class="k"><label for="status">Status</label></div>
                    <div class="v"><select id="status"></select></div>
                </div>
            </div>
            <div>
                <div class="kvs">
                    <div class="k"><label for="value_text">Value text</label></div>
                    <div class="v"><input id="value_text" type="text"/></div>
                    <div class="k"><label for="value_numeric">Value numeric</label></div>
                    <div class="v"><input id="value_numeric" type="number"/></div>
                    <div class="k"><label for="value_boolean">Value boolean</label></div>
                    <div class="v"><input id="value_boolean" type="checkbox"/></div>
                </div>
                <div class="form-row mt-075">
                    <input id="edit_id" type="hidden"/>
                    <button type="submit">Save</button>
                    <button id="resetBtn" class="secondary" type="button">Reset</button>
                </div>
            </div>
        </form>
    </section>

    <script type="module" th:src="@{/assets/js/pages/policies_system_rule_conditions.js}"></script>
</section>
</html>
