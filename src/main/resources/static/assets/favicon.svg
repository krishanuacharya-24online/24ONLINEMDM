<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 512 512"
     width="512"
     height="512">

    <!-- Shield Background -->
    <defs>
        <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2b8fbf"/>
            <stop offset="100%" stop-color="#0f3e63"/>
        </linearGradient>

        <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38c172"/>
            <stop offset="100%" stop-color="#1e7f4f"/>
        </linearGradient>

        <linearGradient id="yellowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f8d46a"/>
            <stop offset="100%" stop-color="#e6a800"/>
        </linearGradient>
    </defs>

    <!-- Shield Left -->
    <path d="
        M256 40
        L120 100
        L120 280
        C120 380 200 440 256 472
        L256 40
    " fill="url(#blueGrad)"/>

    <!-- Shield Right -->
    <path d="
        M256 40
        L392 100
        L392 280
        C392 380 312 440 256 472
        L256 40
    " fill="url(#greenGrad)"/>

    <!-- Main Arrow -->
    <path d="
        M220 320
        L340 160
        L350 180
        L240 340
        Z
    " fill="white"/>

    <polygon points="340,160 380,140 355,200" fill="white"/>

    <!-- Secondary Arrow -->
    <path d="
        M260 340
        L360 210
        L370 225
        L275 350
        Z
    " fill="url(#yellowGrad)"/>

</svg>