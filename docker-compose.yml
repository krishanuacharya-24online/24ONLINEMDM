services:
  mdm-db:
    image: postgres:18-alpine
    container_name: mdm-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mdm}
      POSTGRES_USER: ${POSTGRES_USER:-mdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdm}
      MDM_DB_SEED_DUMP: ${MDM_DB_SEED_DUMP:-/seed/mdm.dump}
      MDM_DB_SEED_BASE_DIR: /seed
    ports:
      - "${MDM_POSTGRES_PORT:-5433}:5432"
    volumes:
      - mdm_db_data:/var/lib/postgresql
      - ./tools/ops:/seed:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdm} -d ${POSTGRES_DB:-mdm}" ]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - mdm_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  zipkin:
    image: openzipkin/zipkin:3.4.1
    container_name: zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped

  superset-db:
    image: postgres:18-alpine
    container_name: superset-db
    environment:
      POSTGRES_DB: ${SUPERSET_DB_NAME:-superset}
      POSTGRES_USER: ${SUPERSET_DB_USER:-superset}
      POSTGRES_PASSWORD: ${SUPERSET_DB_PASSWORD:-superset}
    volumes:
      - superset_db_data:/var/lib/postgresql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SUPERSET_DB_USER:-superset} -d ${SUPERSET_DB_NAME:-superset}" ]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  superset-redis:
    image: redis:7-alpine
    container_name: superset-redis
    command: [ "redis-server", "--save", "", "--appendonly", "no" ]
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  superset-init:
    build:
      context: .
      dockerfile: ./ops/superset/Dockerfile
    image: 24onlinemdm-superset:4.1.1
    container_name: superset-init
    depends_on:
      superset-db:
        condition: service_healthy
      superset-redis:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-replace-with-a-long-random-secret}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_DATABASE_URI: postgresql+psycopg2://${SUPERSET_DB_USER:-superset}:${SUPERSET_DB_PASSWORD:-superset}@superset-db:5432/${SUPERSET_DB_NAME:-superset}
      REDIS_HOST: superset-redis
      REDIS_PORT: 6379
      SUPERSET_TALISMAN_ENABLED: ${SUPERSET_TALISMAN_ENABLED:-false}
      SUPERSET_EMBEDDING_ORIGINS: "${SUPERSET_EMBEDDING_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}"
      SUPERSET_WTF_CSRF_ENABLED: ${SUPERSET_WTF_CSRF_ENABLED:-false}
      SUPERSET_GUEST_TOKEN_JWT_AUDIENCE: ${SUPERSET_GUEST_TOKEN_JWT_AUDIENCE:-superset}
      SUPERSET_ADMIN_USERNAME: ${SUPERSET_ADMIN_USERNAME:-admin}
      SUPERSET_ADMIN_FIRSTNAME: ${SUPERSET_ADMIN_FIRSTNAME:-Superset}
      SUPERSET_ADMIN_LASTNAME: ${SUPERSET_ADMIN_LASTNAME:-Admin}
      SUPERSET_ADMIN_EMAIL: ${SUPERSET_ADMIN_EMAIL:-admin@local}
      SUPERSET_ADMIN_PASSWORD: ${SUPERSET_ADMIN_PASSWORD:-admin}
    volumes:
      - ./ops/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin
      --username $${SUPERSET_ADMIN_USERNAME}
      --firstname $${SUPERSET_ADMIN_FIRSTNAME}
      --lastname $${SUPERSET_ADMIN_LASTNAME}
      --email $${SUPERSET_ADMIN_EMAIL}
      --password $${SUPERSET_ADMIN_PASSWORD} &&
      superset init
      "
    restart: "no"

  superset:
    image: 24onlinemdm-superset:4.1.1
    container_name: superset
    depends_on:
      superset-init:
        condition: service_completed_successfully
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-replace-with-a-long-random-secret}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_DATABASE_URI: postgresql+psycopg2://${SUPERSET_DB_USER:-superset}:${SUPERSET_DB_PASSWORD:-superset}@superset-db:5432/${SUPERSET_DB_NAME:-superset}
      REDIS_HOST: superset-redis
      REDIS_PORT: 6379
      SUPERSET_TALISMAN_ENABLED: ${SUPERSET_TALISMAN_ENABLED:-false}
      SUPERSET_EMBEDDING_ORIGINS: "${SUPERSET_EMBEDDING_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}"
      SUPERSET_WTF_CSRF_ENABLED: ${SUPERSET_WTF_CSRF_ENABLED:-false}
      SUPERSET_GUEST_TOKEN_JWT_AUDIENCE: ${SUPERSET_GUEST_TOKEN_JWT_AUDIENCE:-superset}
    volumes:
      - ./ops/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    command: >
      /bin/sh -c "
      gunicorn
      --bind 0.0.0.0:8088
      --workers ${SUPERSET_GUNICORN_WORKERS:-4}
      --timeout 120
      'superset.app:create_app()'
      "
    ports:
      - "${SUPERSET_PORT:-8088}:8088"
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import sys, urllib.request; sys.exit(0 if urllib.request.urlopen('http://localhost:8088/health').status == 200 else 1)\"" ]
      interval: 15s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  superset-worker:
    image: 24onlinemdm-superset:4.1.1
    container_name: superset-worker
    depends_on:
      superset:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-replace-with-a-long-random-secret}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_DATABASE_URI: postgresql+psycopg2://${SUPERSET_DB_USER:-superset}:${SUPERSET_DB_PASSWORD:-superset}@superset-db:5432/${SUPERSET_DB_NAME:-superset}
      REDIS_HOST: superset-redis
      REDIS_PORT: 6379
      SUPERSET_TALISMAN_ENABLED: ${SUPERSET_TALISMAN_ENABLED:-false}
      SUPERSET_EMBEDDING_ORIGINS: "${SUPERSET_EMBEDDING_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}"
      SUPERSET_WTF_CSRF_ENABLED: ${SUPERSET_WTF_CSRF_ENABLED:-false}
      SUPERSET_GUEST_TOKEN_JWT_AUDIENCE: ${SUPERSET_GUEST_TOKEN_JWT_AUDIENCE:-superset}
    volumes:
      - ./ops/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    command: >
      /bin/sh -c "
      celery --app=superset.tasks.celery_app:app worker --pool=prefork -O fair --loglevel=INFO
      "
    healthcheck:
      disable: true
    restart: unless-stopped

  superset-beat:
    image: 24onlinemdm-superset:4.1.1
    container_name: superset-beat
    depends_on:
      superset:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-replace-with-a-long-random-secret}
      SUPERSET_CONFIG_PATH: /app/pythonpath/superset_config.py
      SUPERSET_DATABASE_URI: postgresql+psycopg2://${SUPERSET_DB_USER:-superset}:${SUPERSET_DB_PASSWORD:-superset}@superset-db:5432/${SUPERSET_DB_NAME:-superset}
      REDIS_HOST: superset-redis
      REDIS_PORT: 6379
      SUPERSET_TALISMAN_ENABLED: ${SUPERSET_TALISMAN_ENABLED:-false}
      SUPERSET_EMBEDDING_ORIGINS: "${SUPERSET_EMBEDDING_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}"
      SUPERSET_WTF_CSRF_ENABLED: ${SUPERSET_WTF_CSRF_ENABLED:-false}
      SUPERSET_GUEST_TOKEN_JWT_AUDIENCE: ${SUPERSET_GUEST_TOKEN_JWT_AUDIENCE:-superset}
    volumes:
      - ./ops/superset/superset_config.py:/app/pythonpath/superset_config.py:ro
    command: >
      /bin/sh -c "
      celery --app=superset.tasks.celery_app:app beat --loglevel=INFO --schedule /tmp/celerybeat-schedule --pidfile /tmp/celerybeat.pid
      "
    healthcheck:
      disable: true
    restart: unless-stopped
volumes:
  mdm_db_data:
  mdm_rabbitmq_data:
  superset_db_data:
