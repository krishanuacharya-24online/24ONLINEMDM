services:
  mdm-db:
    image: postgres:18-alpine
    container_name: mdm-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mdm}
      POSTGRES_USER: ${POSTGRES_USER:-mdm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mdm}
      MDM_DB_SEED_DUMP: ${MDM_DB_SEED_DUMP:-/seed/mdm.dump}
      MDM_DB_SEED_BASE_DIR: /seed
    ports:
      - "${MDM_POSTGRES_PORT:-5433}:5432"
    volumes:
      - mdm_db_data:/var/lib/postgresql
      - ./tools/ops:/seed:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-mdm} -d ${POSTGRES_DB:-mdm}" ]
      interval: 10s
      timeout: 5s
      retries: 15
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - mdm_rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
  zipkin:
    image: openzipkin/zipkin:3.4.1
    container_name: zipkin
    ports:
      - "9411:9411"
    restart: unless-stopped

volumes:
  mdm_db_data:
  mdm_rabbitmq_data:
